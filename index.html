<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hola Mundo - Docker</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to right, #24243e, #302b63, #0f0c29);
    }

    .container {
      text-align: center;
      background: rgba(255, 255, 255, 0.1);
      padding: 60px;
      border-radius: 20px;
      color: white;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0); }
    }

    h1 {
      color: #667eea;
      font-size: 48px;
      margin-bottom: 15px;
    }

    .subtitle {
      color: #764ba2;
      font-size: 22px;
      margin-bottom: 30px;
    }

    .badge {
      display: inline-block;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 12px 25px;
      border-radius: 30px;
      font-size: 14px;
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #ccc;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🐳 ¡Hola Mundo!</h1>
    <p class="subtitle">App Dockerizada con Éxito 🚀</p>
    <span class="badge">Docker + Node.js</span>
    <p class="footer">Ejecutándose en puerto 3000</p>
  </div>
</body>
</html>
